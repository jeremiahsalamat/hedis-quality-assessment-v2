<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 720" font-family="Arial, Helvetica, sans-serif">
  <rect width="1400" height="720" fill="#ffffff"/>

  <!-- Title -->
  <text x="700" y="42" font-size="26" font-weight="700" text-anchor="middle" fill="#1a2a3a">HEDIS Data Pipeline — From Raw Data to Report Table</text>
  <text x="700" y="68" font-size="15" font-style="italic" text-anchor="middle" fill="#5a6a7a">Jeremiah Salamat · github.com/jeremiahsalamat · HEDIS Quality Assessment Project · MY 2025</text>

  <!-- ===== STAGE 1: RAW DATA SOURCES ===== -->
  <rect x="40" y="100" width="240" height="580" rx="12" fill="#e8f1fa" stroke="#2d5f8b" stroke-width="2.5"/>
  <text x="160" y="135" font-size="17" font-weight="700" text-anchor="middle" fill="#1a3a5c">1. RAW DATA SOURCES</text>
  <text x="160" y="157" font-size="12" text-anchor="middle" fill="#4a5a6a">claims · EHR · HIE · pharmacy</text>

  <rect x="60" y="180" width="200" height="68" rx="7" fill="#ffffff" stroke="#2d5f8b" stroke-width="1.4"/>
  <text x="160" y="206" font-size="14" font-weight="600" text-anchor="middle" fill="#1a3a5c">Claims Feed</text>
  <text x="160" y="228" font-size="11" text-anchor="middle" fill="#4a5a6a">ICD-10, CPT, HCPCS, POS</text>

  <rect x="60" y="260" width="200" height="68" rx="7" fill="#ffffff" stroke="#2d5f8b" stroke-width="1.4"/>
  <text x="160" y="286" font-size="14" font-weight="600" text-anchor="middle" fill="#1a3a5c">EHR / HIE</text>
  <text x="160" y="308" font-size="11" text-anchor="middle" fill="#4a5a6a">Vitals, labs</text>

  <rect x="60" y="340" width="200" height="68" rx="7" fill="#ffffff" stroke="#2d5f8b" stroke-width="1.4"/>
  <text x="160" y="366" font-size="14" font-weight="600" text-anchor="middle" fill="#1a3a5c">Pharmacy</text>
  <text x="160" y="388" font-size="11" text-anchor="middle" fill="#4a5a6a">NDC, days supply</text>

  <rect x="60" y="420" width="200" height="68" rx="7" fill="#ffffff" stroke="#2d5f8b" stroke-width="1.4"/>
  <text x="160" y="446" font-size="14" font-weight="600" text-anchor="middle" fill="#1a3a5c">Eligibility</text>
  <text x="160" y="468" font-size="11" text-anchor="middle" fill="#4a5a6a">Enrollment spans, payer line</text>

  <rect x="60" y="500" width="200" height="68" rx="7" fill="#ffffff" stroke="#2d5f8b" stroke-width="1.4"/>
  <text x="160" y="526" font-size="14" font-weight="600" text-anchor="middle" fill="#1a3a5c">Provider Roster</text>
  <text x="160" y="548" font-size="11" text-anchor="middle" fill="#4a5a6a">NPI, specialty, PCP panel</text>

  <rect x="60" y="580" width="200" height="68" rx="7" fill="#fff8e8" stroke="#b38600" stroke-width="1.4"/>
  <text x="160" y="606" font-size="14" font-weight="600" text-anchor="middle" fill="#7a5a00">NCQA Value Sets</text>
  <text x="160" y="628" font-size="11" text-anchor="middle" fill="#7a5a00">HEDIS Vol 2 code tables</text>

  <!-- arrow 1 -> 2 -->
  <path d="M 280 380 L 335 380" stroke="#2d5f8b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- ===== STAGE 2: INGEST & CLEAN ===== -->
  <rect x="340" y="100" width="260" height="580" rx="12" fill="#e8f5ea" stroke="#3d8b52" stroke-width="2.5"/>
  <text x="470" y="135" font-size="17" font-weight="700" text-anchor="middle" fill="#1a5c2f">2. INGEST &amp; CLEAN</text>
  <text x="470" y="157" font-size="12" text-anchor="middle" fill="#4a6a4a">ETL · staging layer</text>

  <rect x="360" y="180" width="220" height="72" rx="7" fill="#ffffff" stroke="#3d8b52" stroke-width="1.4"/>
  <text x="470" y="207" font-size="14" font-weight="600" text-anchor="middle" fill="#1a5c2f">Standardize identifiers</text>
  <text x="470" y="227" font-size="11" text-anchor="middle" fill="#4a6a4a">Member/Provider/Payer</text>
  <text x="470" y="243" font-size="11" text-anchor="middle" fill="#4a6a4a">crosswalks across plans</text>

  <rect x="360" y="264" width="220" height="72" rx="7" fill="#ffffff" stroke="#3d8b52" stroke-width="1.4"/>
  <text x="470" y="291" font-size="14" font-weight="600" text-anchor="middle" fill="#1a5c2f">Deduplicate claims</text>
  <text x="470" y="311" font-size="11" text-anchor="middle" fill="#4a6a4a">Adjust/void/replace,</text>
  <text x="470" y="327" font-size="11" text-anchor="middle" fill="#4a6a4a">keep latest version</text>

  <rect x="360" y="348" width="220" height="72" rx="7" fill="#ffffff" stroke="#3d8b52" stroke-width="1.4"/>
  <text x="470" y="375" font-size="14" font-weight="600" text-anchor="middle" fill="#1a5c2f">Validate codes</text>
  <text x="470" y="395" font-size="11" text-anchor="middle" fill="#4a6a4a">ICD-10 / CPT / LOINC /</text>
  <text x="470" y="411" font-size="11" text-anchor="middle" fill="#4a6a4a">NDC format + validity</text>

  <rect x="360" y="432" width="220" height="72" rx="7" fill="#ffffff" stroke="#3d8b52" stroke-width="1.4"/>
  <text x="470" y="459" font-size="14" font-weight="600" text-anchor="middle" fill="#1a5c2f">Handle gaps / nulls</text>
  <text x="470" y="479" font-size="11" text-anchor="middle" fill="#4a6a4a">Missing DOB, sex,</text>
  <text x="470" y="495" font-size="11" text-anchor="middle" fill="#4a6a4a">enrollment dates</text>

  <rect x="360" y="516" width="220" height="72" rx="7" fill="#ffffff" stroke="#3d8b52" stroke-width="1.4"/>
  <text x="470" y="543" font-size="14" font-weight="600" text-anchor="middle" fill="#1a5c2f">Load to normalized DB</text>
  <text x="470" y="563" font-size="11" text-anchor="middle" fill="#4a6a4a">SQL Server staging tables,</text>
  <text x="470" y="579" font-size="11" text-anchor="middle" fill="#4a6a4a">indexed by member_id</text>

  <text x="470" y="622" font-size="12" font-style="italic" text-anchor="middle" fill="#4a6a4a">Output: trustworthy,</text>
  <text x="470" y="640" font-size="12" font-style="italic" text-anchor="middle" fill="#4a6a4a">joinable facts</text>

  <!-- arrow 2 -> 3 -->
  <path d="M 600 380 L 655 380" stroke="#3d8b52" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- ===== STAGE 3: HEDIS MEASURE LOGIC ===== -->
  <rect x="660" y="100" width="260" height="580" rx="12" fill="#f5eaf5" stroke="#8b3d85" stroke-width="2.5"/>
  <text x="790" y="135" font-size="17" font-weight="700" text-anchor="middle" fill="#5c1a58">3. HEDIS MEASURE LOGIC</text>
  <text x="790" y="157" font-size="12" text-anchor="middle" fill="#6a4a68">denominator → numerator</text>

  <rect x="680" y="180" width="220" height="72" rx="7" fill="#ffffff" stroke="#8b3d85" stroke-width="1.4"/>
  <text x="790" y="207" font-size="14" font-weight="600" text-anchor="middle" fill="#5c1a58">Continuous enrollment</text>
  <text x="790" y="227" font-size="11" text-anchor="middle" fill="#6a4a68">gate before everything</text>
  <text x="790" y="243" font-size="11" text-anchor="middle" fill="#6a4a68">else</text>

  <rect x="680" y="264" width="220" height="86" rx="7" fill="#ffffff" stroke="#8b3d85" stroke-width="1.4"/>
  <text x="790" y="290" font-size="14" font-weight="600" text-anchor="middle" fill="#5c1a58">Identify ELIGIBLE</text>
  <text x="790" y="307" font-size="14" font-weight="600" text-anchor="middle" fill="#5c1a58">POPULATION</text>
  <text x="790" y="325" font-size="11" text-anchor="middle" fill="#6a4a68">Age + sex + event criteria</text>
  <text x="790" y="341" font-size="11" text-anchor="middle" fill="#6a4a68">e.g. 2+ HTN dx for CBP</text>

  <rect x="680" y="362" width="220" height="86" rx="7" fill="#ffffff" stroke="#8b3d85" stroke-width="1.4"/>
  <text x="790" y="388" font-size="14" font-weight="600" text-anchor="middle" fill="#5c1a58">Apply REQUIRED</text>
  <text x="790" y="405" font-size="14" font-weight="600" text-anchor="middle" fill="#5c1a58">EXCLUSIONS</text>
  <text x="790" y="423" font-size="11" text-anchor="middle" fill="#6a4a68">Hospice, palliative,</text>
  <text x="790" y="439" font-size="11" text-anchor="middle" fill="#6a4a68">hysterectomy, gestational DM</text>

  <rect x="680" y="460" width="220" height="72" rx="7" fill="#ffffff" stroke="#8b3d85" stroke-width="1.4"/>
  <text x="790" y="487" font-size="14" font-weight="600" text-anchor="middle" fill="#5c1a58">Final DENOMINATOR</text>
  <text x="790" y="507" font-size="11" text-anchor="middle" fill="#6a4a68">Eligible pop minus exclusions:</text>
  <text x="790" y="523" font-size="11" text-anchor="middle" fill="#6a4a68">who should receive the service</text>

  <rect x="680" y="544" width="220" height="72" rx="7" fill="#ffffff" stroke="#8b3d85" stroke-width="1.4"/>
  <text x="790" y="571" font-size="14" font-weight="600" text-anchor="middle" fill="#5c1a58">Apply NUMERATOR logic</text>
  <text x="790" y="591" font-size="11" text-anchor="middle" fill="#6a4a68">Did they actually receive the</text>
  <text x="790" y="607" font-size="11" text-anchor="middle" fill="#6a4a68">appropriate service in window?</text>

  <rect x="680" y="625" width="220" height="40" rx="7" fill="#fff4e0" stroke="#b36b00" stroke-width="1.4"/>
  <text x="790" y="643" font-size="13" font-weight="700" text-anchor="middle" fill="#7a4500">Compute RATE</text>
  <text x="790" y="658" font-size="10" text-anchor="middle" fill="#8a5a2a">numerator ÷ denominator × 100</text>

  <!-- arrow 3 -> 4 -->
  <path d="M 920 380 L 975 380" stroke="#8b3d85" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- ===== STAGE 4: REPORT & DELIVERY ===== -->
  <rect x="980" y="100" width="380" height="580" rx="12" fill="#fff8ec" stroke="#b36b00" stroke-width="2.5"/>
  <text x="1170" y="135" font-size="17" font-weight="700" text-anchor="middle" fill="#7a4500">4. REPORT &amp; DELIVERY</text>
  <text x="1170" y="157" font-size="12" text-anchor="middle" fill="#8a5a2a">what stakeholders see</text>

  <!-- Scorecard table -->
  <rect x="1000" y="180" width="340" height="220" rx="8" fill="#ffffff" stroke="#b36b00" stroke-width="1.4"/>
  <text x="1170" y="207" font-size="14" font-weight="700" text-anchor="middle" fill="#7a4500">HEDIS Scorecard — MY 2025</text>
  <text x="1170" y="225" font-size="11" font-style="italic" text-anchor="middle" fill="#8a5a2a">actual output from this project's queries</text>

  <!-- Table header -->
  <line x1="1015" y1="240" x2="1325" y2="240" stroke="#b36b00" stroke-width="1"/>
  <text x="1020" y="256" font-size="12" font-weight="700" fill="#7a4500">Measure</text>
  <text x="1180" y="256" font-size="12" font-weight="700" text-anchor="middle" fill="#7a4500">Denom</text>
  <text x="1225" y="256" font-size="12" font-weight="700" text-anchor="middle" fill="#7a4500">Num</text>
  <text x="1275" y="256" font-size="12" font-weight="700" text-anchor="middle" fill="#7a4500">Rate</text>
  <text x="1320" y="256" font-size="12" font-weight="700" text-anchor="middle" fill="#7a4500">Target</text>
  <line x1="1015" y1="263" x2="1325" y2="263" stroke="#b36b00" stroke-width="1"/>

  <!-- CBP -->
  <text x="1020" y="282" font-size="11" fill="#333">CBP — BP Control</text>
  <text x="1180" y="282" font-size="11" text-anchor="middle" fill="#333">539</text>
  <text x="1225" y="282" font-size="11" text-anchor="middle" fill="#333">333</text>
  <text x="1275" y="282" font-size="11" font-weight="600" text-anchor="middle" fill="#c0720a">61.8%</text>
  <text x="1320" y="282" font-size="11" text-anchor="middle" fill="#333">70%</text>

  <!-- COL-E -->
  <text x="1020" y="302" font-size="11" fill="#333">COL-E — CRC Screening</text>
  <text x="1180" y="302" font-size="11" text-anchor="middle" fill="#333">1,225</text>
  <text x="1225" y="302" font-size="11" text-anchor="middle" fill="#333">591</text>
  <text x="1275" y="302" font-size="11" font-weight="600" text-anchor="middle" fill="#c0720a">48.2%</text>
  <text x="1320" y="302" font-size="11" text-anchor="middle" fill="#333">60%</text>

  <!-- CCS-E -->
  <text x="1020" y="322" font-size="11" fill="#333">CCS-E — Cervical Screening</text>
  <text x="1180" y="322" font-size="11" text-anchor="middle" fill="#333">651</text>
  <text x="1225" y="322" font-size="11" text-anchor="middle" fill="#333">414</text>
  <text x="1275" y="322" font-size="11" font-weight="600" text-anchor="middle" fill="#c0720a">63.6%</text>
  <text x="1320" y="322" font-size="11" text-anchor="middle" fill="#333">70%</text>

  <!-- EED -->
  <text x="1020" y="342" font-size="11" fill="#333">EED — Diabetic Eye Exam</text>
  <text x="1180" y="342" font-size="11" text-anchor="middle" fill="#333">227</text>
  <text x="1225" y="342" font-size="11" text-anchor="middle" fill="#333">173</text>
  <text x="1275" y="342" font-size="11" font-weight="600" text-anchor="middle" fill="#c0720a">76.2%</text>
  <text x="1320" y="342" font-size="11" text-anchor="middle" fill="#333">70%</text>

  <!-- AWV -->
  <text x="1020" y="362" font-size="11" fill="#333">AWV — Annual Wellness</text>
  <text x="1180" y="362" font-size="11" text-anchor="middle" fill="#333">849</text>
  <text x="1225" y="362" font-size="11" text-anchor="middle" fill="#333">459</text>
  <text x="1275" y="362" font-size="11" font-weight="600" text-anchor="middle" fill="#c0720a">54.1%</text>
  <text x="1320" y="362" font-size="11" text-anchor="middle" fill="#333">65%</text>

  <line x1="1015" y1="376" x2="1325" y2="376" stroke="#b36b00" stroke-width="0.5"/>
  <text x="1020" y="392" font-size="10" font-style="italic" fill="#8a5a2a">Stratified by payer: COMM / MCAL / MA / MMP / EXCH</text>

  <!-- Downstream boxes -->
  <rect x="1000" y="425" width="165" height="110" rx="7" fill="#ffffff" stroke="#b36b00" stroke-width="1.4"/>
  <text x="1082" y="448" font-size="13" font-weight="600" text-anchor="middle" fill="#7a4500">Cozeva Dashboard</text>
  <text x="1082" y="470" font-size="10" text-anchor="middle" fill="#8a5a2a">Provider-level HEDIS</text>
  <text x="1082" y="485" font-size="10" text-anchor="middle" fill="#8a5a2a">&amp; STARs scorecards,</text>
  <text x="1082" y="500" font-size="10" text-anchor="middle" fill="#8a5a2a">gap closure UI,</text>
  <text x="1082" y="515" font-size="10" text-anchor="middle" fill="#8a5a2a">care opportunity lists</text>

  <rect x="1175" y="425" width="165" height="110" rx="7" fill="#ffffff" stroke="#b36b00" stroke-width="1.4"/>
  <text x="1257" y="448" font-size="13" font-weight="600" text-anchor="middle" fill="#7a4500">Health Plan Submission</text>
  <text x="1257" y="470" font-size="10" text-anchor="middle" fill="#8a5a2a">NCQA-certified engine</text>
  <text x="1257" y="485" font-size="10" text-anchor="middle" fill="#8a5a2a">output, P4P reports,</text>
  <text x="1257" y="500" font-size="10" text-anchor="middle" fill="#8a5a2a">STARs lookups,</text>
  <text x="1257" y="515" font-size="10" text-anchor="middle" fill="#8a5a2a">audit-ready exports</text>

  <rect x="1000" y="550" width="340" height="110" rx="7" fill="#ffffff" stroke="#b36b00" stroke-width="1.4"/>
  <text x="1170" y="575" font-size="14" font-weight="700" text-anchor="middle" fill="#7a4500">Action Loop Back to Care Teams</text>
  <text x="1170" y="600" font-size="11" text-anchor="middle" fill="#8a5a2a">Gap lists → outreach / scheduling → closed gaps</text>
  <text x="1170" y="620" font-size="11" text-anchor="middle" fill="#8a5a2a">→ re-run pipeline → measure rate improves</text>
  <text x="1170" y="645" font-size="10" font-style="italic" text-anchor="middle" fill="#8a5a2a">This is how quality teams turn numbers into outcomes</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
  </defs>
</svg>
