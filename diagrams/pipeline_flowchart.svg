<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="Arial, Helvetica, sans-serif">
  <rect width="1400" height="900" fill="#ffffff"/>

  <text x="700" y="40" font-size="24" font-weight="700" text-anchor="middle" fill="#1a2a3a">MedPOINT HEDIS Data Pipeline — From Raw Data to Report Table</text>
  <text x="700" y="65" font-size="14" font-style="italic" text-anchor="middle" fill="#5a6a7a">Jeremiah Salamat · github.com/jeremiahsalamat · HEDIS Quality Assessment Project (MY 2025)</text>

  <rect x="40" y="100" width="220" height="520" rx="12" fill="#e8f1fa" stroke="#2d5f8b" stroke-width="2"/>
  <text x="150" y="130" font-size="15" font-weight="700" text-anchor="middle" fill="#1a3a5c">1. RAW DATA SOURCES</text>
  <text x="150" y="150" font-size="11" text-anchor="middle" fill="#4a5a6a">(claims, EHR, HIE, pharmacy)</text>

  <rect x="60" y="170" width="180" height="55" rx="6" fill="#ffffff" stroke="#2d5f8b" stroke-width="1.2"/>
  <text x="150" y="192" font-size="12" font-weight="600" text-anchor="middle" fill="#1a3a5c">Claims Feed (X12 837)</text>
  <text x="150" y="210" font-size="10" text-anchor="middle" fill="#4a5a6a">ICD-10, CPT, HCPCS, POS</text>

  <rect x="60" y="235" width="180" height="55" rx="6" fill="#ffffff" stroke="#2d5f8b" stroke-width="1.2"/>
  <text x="150" y="257" font-size="12" font-weight="600" text-anchor="middle" fill="#1a3a5c">EHR / HIE (FHIR, HL7)</text>
  <text x="150" y="275" font-size="10" text-anchor="middle" fill="#4a5a6a">Vitals, labs (LOINC)</text>

  <rect x="60" y="300" width="180" height="55" rx="6" fill="#ffffff" stroke="#2d5f8b" stroke-width="1.2"/>
  <text x="150" y="322" font-size="12" font-weight="600" text-anchor="middle" fill="#1a3a5c">Pharmacy (NCPDP D.0)</text>
  <text x="150" y="340" font-size="10" text-anchor="middle" fill="#4a5a6a">NDC, days supply</text>

  <rect x="60" y="365" width="180" height="55" rx="6" fill="#ffffff" stroke="#2d5f8b" stroke-width="1.2"/>
  <text x="150" y="387" font-size="12" font-weight="600" text-anchor="middle" fill="#1a3a5c">Eligibility (X12 834)</text>
  <text x="150" y="405" font-size="10" text-anchor="middle" fill="#4a5a6a">Enrollment spans, payer line</text>

  <rect x="60" y="430" width="180" height="55" rx="6" fill="#ffffff" stroke="#2d5f8b" stroke-width="1.2"/>
  <text x="150" y="452" font-size="12" font-weight="600" text-anchor="middle" fill="#1a3a5c">Provider Roster</text>
  <text x="150" y="470" font-size="10" text-anchor="middle" fill="#4a5a6a">NPI, specialty, PCP panel</text>

  <rect x="60" y="495" width="180" height="55" rx="6" fill="#fff8e8" stroke="#b38600" stroke-width="1.2"/>
  <text x="150" y="517" font-size="12" font-weight="600" text-anchor="middle" fill="#7a5a00">NCQA Value Sets</text>
  <text x="150" y="535" font-size="10" text-anchor="middle" fill="#7a5a00">HEDIS Vol 2 code tables</text>

  <text x="150" y="580" font-size="10" font-style="italic" text-anchor="middle" fill="#5a6a7a">Messy, duplicated,</text>
  <text x="150" y="595" font-size="10" font-style="italic" text-anchor="middle" fill="#5a6a7a">multi-format, lag-prone</text>

  <path d="M 260 360 L 315 360" stroke="#2d5f8b" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>

  <rect x="320" y="100" width="230" height="520" rx="12" fill="#eef4ea" stroke="#4a7a2a" stroke-width="2"/>
  <text x="435" y="130" font-size="15" font-weight="700" text-anchor="middle" fill="#2e5a1a">2. INGEST &amp; CLEAN</text>
  <text x="435" y="150" font-size="11" text-anchor="middle" fill="#4a6a3a">(ETL / staging layer)</text>

  <rect x="340" y="170" width="190" height="65" rx="6" fill="#ffffff" stroke="#4a7a2a" stroke-width="1.2"/>
  <text x="435" y="190" font-size="11" font-weight="600" text-anchor="middle" fill="#2e5a1a">Standardize identifiers</text>
  <text x="435" y="208" font-size="10" text-anchor="middle" fill="#4a6a3a">Member/Provider/Payer</text>
  <text x="435" y="222" font-size="10" text-anchor="middle" fill="#4a6a3a">crosswalks across plans</text>

  <rect x="340" y="245" width="190" height="65" rx="6" fill="#ffffff" stroke="#4a7a2a" stroke-width="1.2"/>
  <text x="435" y="265" font-size="11" font-weight="600" text-anchor="middle" fill="#2e5a1a">Deduplicate claims</text>
  <text x="435" y="283" font-size="10" text-anchor="middle" fill="#4a6a3a">Adjust/void/replace,</text>
  <text x="435" y="297" font-size="10" text-anchor="middle" fill="#4a6a3a">keep latest version</text>

  <rect x="340" y="320" width="190" height="65" rx="6" fill="#ffffff" stroke="#4a7a2a" stroke-width="1.2"/>
  <text x="435" y="340" font-size="11" font-weight="600" text-anchor="middle" fill="#2e5a1a">Validate codes</text>
  <text x="435" y="358" font-size="10" text-anchor="middle" fill="#4a6a3a">ICD-10 / CPT / LOINC /</text>
  <text x="435" y="372" font-size="10" text-anchor="middle" fill="#4a6a3a">NDC format + validity</text>

  <rect x="340" y="395" width="190" height="65" rx="6" fill="#ffffff" stroke="#4a7a2a" stroke-width="1.2"/>
  <text x="435" y="415" font-size="11" font-weight="600" text-anchor="middle" fill="#2e5a1a">Handle gaps / nulls</text>
  <text x="435" y="433" font-size="10" text-anchor="middle" fill="#4a6a3a">Missing DOB, sex,</text>
  <text x="435" y="447" font-size="10" text-anchor="middle" fill="#4a6a3a">enrollment dates</text>

  <rect x="340" y="470" width="190" height="65" rx="6" fill="#ffffff" stroke="#4a7a2a" stroke-width="1.2"/>
  <text x="435" y="490" font-size="11" font-weight="600" text-anchor="middle" fill="#2e5a1a">Load to normalized DB</text>
  <text x="435" y="508" font-size="10" text-anchor="middle" fill="#4a6a3a">SQL Server staging tables,</text>
  <text x="435" y="522" font-size="10" text-anchor="middle" fill="#4a6a3a">indexed by member_id</text>

  <text x="435" y="565" font-size="10" font-style="italic" text-anchor="middle" fill="#5a6a7a">Output: trustworthy,</text>
  <text x="435" y="580" font-size="10" font-style="italic" text-anchor="middle" fill="#5a6a7a">joinable facts</text>

  <path d="M 550 360 L 605 360" stroke="#4a7a2a" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>

  <rect x="610" y="100" width="270" height="520" rx="12" fill="#f5eaf2" stroke="#8a2a6e" stroke-width="2"/>
  <text x="745" y="130" font-size="15" font-weight="700" text-anchor="middle" fill="#5a1a4a">3. HEDIS MEASURE LOGIC</text>
  <text x="745" y="150" font-size="11" text-anchor="middle" fill="#6a3a5a">(denominator → numerator)</text>

  <rect x="630" y="170" width="230" height="50" rx="6" fill="#ffffff" stroke="#8a2a6e" stroke-width="1.2"/>
  <text x="745" y="188" font-size="11" font-weight="600" text-anchor="middle" fill="#5a1a4a">Continuous enrollment</text>
  <text x="745" y="205" font-size="10" text-anchor="middle" fill="#6a3a5a">(gate before everything else)</text>

  <rect x="630" y="230" width="230" height="55" rx="6" fill="#ffffff" stroke="#8a2a6e" stroke-width="1.2"/>
  <text x="745" y="250" font-size="11" font-weight="600" text-anchor="middle" fill="#5a1a4a">Identify ELIGIBLE POPULATION</text>
  <text x="745" y="266" font-size="10" text-anchor="middle" fill="#6a3a5a">Age + sex + event criteria</text>
  <text x="745" y="278" font-size="10" text-anchor="middle" fill="#6a3a5a">(e.g. 2+ HTN dx for CBP)</text>

  <rect x="630" y="295" width="230" height="55" rx="6" fill="#ffffff" stroke="#8a2a6e" stroke-width="1.2"/>
  <text x="745" y="315" font-size="11" font-weight="600" text-anchor="middle" fill="#5a1a4a">Apply REQUIRED EXCLUSIONS</text>
  <text x="745" y="331" font-size="10" text-anchor="middle" fill="#6a3a5a">Hospice, palliative, hysterectomy,</text>
  <text x="745" y="343" font-size="10" text-anchor="middle" fill="#6a3a5a">gestational diabetes, etc.</text>

  <rect x="630" y="360" width="230" height="55" rx="6" fill="#ffffff" stroke="#8a2a6e" stroke-width="1.2"/>
  <text x="745" y="380" font-size="11" font-weight="600" text-anchor="middle" fill="#5a1a4a">Final DENOMINATOR</text>
  <text x="745" y="395" font-size="10" text-anchor="middle" fill="#6a3a5a">The eligible pop minus exclusions —</text>
  <text x="745" y="408" font-size="10" text-anchor="middle" fill="#6a3a5a">who should receive the service</text>

  <rect x="630" y="425" width="230" height="55" rx="6" fill="#ffffff" stroke="#8a2a6e" stroke-width="1.2"/>
  <text x="745" y="445" font-size="11" font-weight="600" text-anchor="middle" fill="#5a1a4a">Apply NUMERATOR logic</text>
  <text x="745" y="461" font-size="10" text-anchor="middle" fill="#6a3a5a">Did they actually receive the</text>
  <text x="745" y="473" font-size="10" text-anchor="middle" fill="#6a3a5a">appropriate service in the window?</text>

  <rect x="630" y="490" width="230" height="55" rx="6" fill="#fff8e8" stroke="#b38600" stroke-width="1.2"/>
  <text x="745" y="510" font-size="11" font-weight="600" text-anchor="middle" fill="#7a5a00">Compute RATE</text>
  <text x="745" y="525" font-size="10" text-anchor="middle" fill="#7a5a00">numerator ÷ denominator × 100</text>
  <text x="745" y="538" font-size="10" text-anchor="middle" fill="#7a5a00">(stratified by payer / PCP)</text>

  <text x="745" y="580" font-size="10" font-style="italic" text-anchor="middle" fill="#5a6a7a">Built as layered CTEs in</text>
  <text x="745" y="595" font-size="10" font-style="italic" text-anchor="middle" fill="#5a6a7a">SQL Server (T-SQL)</text>

  <path d="M 880 360 L 935 360" stroke="#8a2a6e" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>

  <rect x="940" y="100" width="420" height="520" rx="12" fill="#fbf4e8" stroke="#b36b00" stroke-width="2"/>
  <text x="1150" y="130" font-size="15" font-weight="700" text-anchor="middle" fill="#7a4500">4. REPORT &amp; DELIVERY</text>
  <text x="1150" y="150" font-size="11" text-anchor="middle" fill="#8a5a2a">(what stakeholders see)</text>

  <rect x="960" y="170" width="380" height="230" rx="6" fill="#ffffff" stroke="#b36b00" stroke-width="1.2"/>
  <text x="1150" y="192" font-size="12" font-weight="600" text-anchor="middle" fill="#7a4500">MedPOINT HEDIS Scorecard — MY 2025</text>
  <text x="1150" y="208" font-size="9" font-style="italic" text-anchor="middle" fill="#8a5a2a">(actual output from this project's queries)</text>

  <line x1="975" y1="220" x2="1325" y2="220" stroke="#b36b00" stroke-width="0.5"/>
  <text x="975"  y="235" font-size="10" font-weight="600" fill="#7a4500">Measure</text>
  <text x="1165" y="235" font-size="10" font-weight="600" text-anchor="middle" fill="#7a4500">Denom</text>
  <text x="1215" y="235" font-size="10" font-weight="600" text-anchor="middle" fill="#7a4500">Num</text>
  <text x="1265" y="235" font-size="10" font-weight="600" text-anchor="middle" fill="#7a4500">Rate</text>
  <text x="1310" y="235" font-size="10" font-weight="600" text-anchor="middle" fill="#7a4500">Target</text>
  <line x1="975" y1="242" x2="1325" y2="242" stroke="#b36b00" stroke-width="0.5"/>

  <text x="975"  y="258" font-size="10" fill="#333">CBP — BP Control</text>
  <text x="1165" y="258" font-size="10" text-anchor="middle" fill="#333">529</text>
  <text x="1215" y="258" font-size="10" text-anchor="middle" fill="#333">330</text>
  <text x="1265" y="258" font-size="10" font-weight="600" text-anchor="middle" fill="#2a7a2a">62.4%</text>
  <text x="1310" y="258" font-size="10" text-anchor="middle" fill="#333">70%</text>

  <text x="975"  y="275" font-size="10" fill="#333">COL-E — CRC Screening</text>
  <text x="1165" y="275" font-size="10" text-anchor="middle" fill="#333">1,222</text>
  <text x="1215" y="275" font-size="10" text-anchor="middle" fill="#333">619</text>
  <text x="1265" y="275" font-size="10" font-weight="600" text-anchor="middle" fill="#c0720a">50.7%</text>
  <text x="1310" y="275" font-size="10" text-anchor="middle" fill="#333">60%</text>

  <text x="975"  y="292" font-size="10" fill="#333">CCS-E — Cervical Screening</text>
  <text x="1165" y="292" font-size="10" text-anchor="middle" fill="#333">657</text>
  <text x="1215" y="292" font-size="10" text-anchor="middle" fill="#333">428</text>
  <text x="1265" y="292" font-size="10" font-weight="600" text-anchor="middle" fill="#2a7a2a">65.1%</text>
  <text x="1310" y="292" font-size="10" text-anchor="middle" fill="#333">70%</text>

  <text x="975"  y="309" font-size="10" fill="#333">EED — Diabetic Eye Exam</text>
  <text x="1165" y="309" font-size="10" text-anchor="middle" fill="#333">212</text>
  <text x="1215" y="309" font-size="10" text-anchor="middle" fill="#333">143</text>
  <text x="1265" y="309" font-size="10" font-weight="600" text-anchor="middle" fill="#2a7a2a">67.5%</text>
  <text x="1310" y="309" font-size="10" text-anchor="middle" fill="#333">70%</text>

  <text x="975"  y="326" font-size="10" fill="#333">AWV — Annual Wellness</text>
  <text x="1165" y="326" font-size="10" text-anchor="middle" fill="#333">852</text>
  <text x="1215" y="326" font-size="10" text-anchor="middle" fill="#333">478</text>
  <text x="1265" y="326" font-size="10" font-weight="600" text-anchor="middle" fill="#c0720a">56.1%</text>
  <text x="1310" y="326" font-size="10" text-anchor="middle" fill="#333">65%</text>

  <line x1="975" y1="340" x2="1325" y2="340" stroke="#b36b00" stroke-width="0.5"/>

  <text x="980" y="365" font-size="9" font-style="italic" fill="#8a5a2a">Stratified by payer: COMM / MCAL / MA / MMP / EXCH</text>
  <text x="980" y="380" font-size="9" font-style="italic" fill="#8a5a2a">Gap lists drilled to member-level for care coordinators</text>

  <rect x="960" y="420" width="180" height="85" rx="6" fill="#ffffff" stroke="#b36b00" stroke-width="1.2"/>
  <text x="1050" y="440" font-size="11" font-weight="600" text-anchor="middle" fill="#7a4500">Cozeva Dashboard</text>
  <text x="1050" y="458" font-size="9" text-anchor="middle" fill="#8a5a2a">Provider-level HEDIS &amp; STARs</text>
  <text x="1050" y="472" font-size="9" text-anchor="middle" fill="#8a5a2a">scorecards, gap closure UI,</text>
  <text x="1050" y="486" font-size="9" text-anchor="middle" fill="#8a5a2a">care opportunity lists</text>

  <rect x="1160" y="420" width="180" height="85" rx="6" fill="#ffffff" stroke="#b36b00" stroke-width="1.2"/>
  <text x="1250" y="440" font-size="11" font-weight="600" text-anchor="middle" fill="#7a4500">Health Plan Submission</text>
  <text x="1250" y="458" font-size="9" text-anchor="middle" fill="#8a5a2a">NCQA-certified engine output,</text>
  <text x="1250" y="472" font-size="9" text-anchor="middle" fill="#8a5a2a">P4P reports, STARs lookups,</text>
  <text x="1250" y="486" font-size="9" text-anchor="middle" fill="#8a5a2a">audit-ready exports</text>

  <rect x="960" y="520" width="380" height="75" rx="6" fill="#ffffff" stroke="#b36b00" stroke-width="1.2"/>
  <text x="1150" y="542" font-size="11" font-weight="600" text-anchor="middle" fill="#7a4500">Action Loop Back to Care Teams</text>
  <text x="1150" y="560" font-size="10" text-anchor="middle" fill="#8a5a2a">Gap lists → outreach / scheduling → closed gaps</text>
  <text x="1150" y="575" font-size="10" text-anchor="middle" fill="#8a5a2a">→ re-run pipeline → measure rate improves</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
  </defs>

  <rect x="40" y="660" width="1320" height="200" rx="10" fill="#f4f7fa" stroke="#5a6a7a" stroke-width="1.2"/>
  <text x="700" y="685" font-size="14" font-weight="700" text-anchor="middle" fill="#1a2a3a">The "-E" Suffix Explained (and why it matters to MedPOINT)</text>

  <text x="70" y="715" font-size="11" fill="#2a3a4a"><tspan font-weight="600">Traditional HEDIS:</tspan> numerator events come from claims (CPT/HCPCS) only, plus optional chart review (Hybrid Method).</text>
  <text x="70" y="735" font-size="11" fill="#2a3a4a"><tspan font-weight="600">ECDS (-E measures):</tspan> numerator events can also come from EHR structured data — lab results (LOINC), HIE feeds, case management.</text>
  <text x="70" y="755" font-size="11" fill="#2a3a4a"><tspan font-weight="600">Why it matters:</tspan> COL-E and CCS-E give credit for screenings that happened in EHR data even if no CPT was billed — a big win for Medi-Cal FQHCs.</text>

  <text x="70" y="790" font-size="11" fill="#2a3a4a"><tspan font-weight="600">MedPOINT's position:</tspan> They manage 950k+ members across Commercial, Medi-Cal, Medicare Advantage, Medi-Medi, and Covered California.</text>
  <text x="70" y="810" font-size="11" fill="#2a3a4a">Cozeva is their HEDIS engine. The Quality Management Informatics team translates raw claims/EHR into the scorecards their IPA partners act on.</text>
  <text x="70" y="830" font-size="11" fill="#2a3a4a"><tspan font-weight="600">This project mirrors that pipeline end-to-end</tspan> — from ICD-10 and CPT in raw files, through NCQA value sets, to a report table a care team can use.</text>
</svg>
